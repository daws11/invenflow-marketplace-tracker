<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>InvenFlow Tracker Scraper</title>
    <style>
      body { font: 13px/1.45 system-ui, sans-serif; width: 340px; margin: 0; padding: 12px; color: #222; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .acct { border: 1px solid #e3e3e3; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
      .name { font-weight: 600; }
      .meta { color: #666; font-size: 12px; margin-top: 2px; }
      .err { color: #b71c1c; }
      .state { font-size: 11px; padding: 1px 6px; border-radius: 10px; float: right; text-transform: lowercase; }
      .s-ok { background: #e7f6ec; color: #1b5e20; }
      .s-error, .s-session_expired { background: #fdecea; color: #b71c1c; }
      .s-running { background: #fff4e5; color: #8a5300; }
      .s-idle { background: #eee; color: #555; }
      button { font: inherit; padding: 5px 10px; border: 1px solid #222; background: #222; color: #fff; border-radius: 6px; cursor: pointer; }
      button.sm { padding: 3px 8px; font-size: 12px; margin-top: 6px; }
      button:disabled { opacity: 0.6; cursor: default; }
      a { color: #1565c0; cursor: pointer; }
      .foot { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
  </head>
  <body>
    <h1>InvenFlow Tracker Scraper</h1>
    <div id="list">Loading…</div>
    <div class="foot">
      <button id="all">Scrape all now</button>
      <a id="opts">Options</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
